<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>פיקלבול 🎾</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

button {
  cursor: pointer;
}

.login {
  width: 100%;
  padding: 12px;
  background: #6366f1;
  color: white;
  font-weight: bold;
  border: none;
  border-radius: 10px;
}

.primary {
  width: 100%;
  padding: 12px;
  background: #38bdf8;
  font-weight: bold;
  border: none;
  border-radius: 10px;
}

.slot {
  background: #475569;
  padding: 10px;
  margin-top: 6px;
  border-radius: 8px;
}

.slot.selected {
  background: #22c55e;
}

.slot.clickable {
  cursor: pointer;
}

#userBox {
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body dir="rtl">

<div class="container">

  <h1>🎾 פיקלבול</h1>

  <!-- AUTH -->
  <div class="card" id="authBox">
    <input id="email" placeholder="אימייל להתחברות">
    <button class="login" onclick="login()">🔐 התחבר</button>
    <div id="errorBox" style="color:red;margin-top:10px;"></div>
  </div>

  <!-- APP -->
  <div id="appBox" style="display:none;">

    <div class="card">
      <input id="name" placeholder="שם מלא">
      <button class="primary" onclick="submitForm()">הרשמה</button>
    </div>

    <div id="days"></div>
  </div>

  <div id="userBox"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://svasvbooeixwbfgyteml.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2YXN2Ym9vZWl4d2JmZ3l0ZW1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODE3MDAsImV4cCI6MjA5MTQ1NzcwMH0.SseXrAMUs8hgIxT0jOccH8svqaPR7lgOAWNcYvDvdo0";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true,
  },
});

let selected = [];

/* =========================
   LOGIN
========================= */
async function login() {
  const email = document.getElementById("email").value.trim();
  const errorBox = document.getElementById("errorBox");

  try {
    const { error } = await client.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.href }
    });

    if (error) throw error;

    alert("נשלח מייל 📧");
  } catch (err) {
    errorBox.innerText = err.message;
  }
}

/* =========================
   SESSION
========================= */
async function checkSession() {
  const { data: { session } } = await client.auth.getSession();
  const user = session?.user;

  const authBox = document.getElementById("authBox");
  const appBox = document.getElementById("appBox");
  const userBox = document.getElementById("userBox");

  if (user) {
    authBox.style.display = "none";
    appBox.style.display = "block";
    userBox.innerHTML = `מחובר: <b>${user.email}</b>`;
    fetchRegistrations();
  } else {
    authBox.style.display = "block";
    appBox.style.display = "none";
    userBox.innerHTML = "";
  }
}

/* =========================
   FETCH
========================= */
async function fetchRegistrations() {
  const { data: { session } } = await client.auth.getSession();
  if (!session?.access_token) return;

  const res = await fetch(`${SUPABASE_URL}/functions/v1/get-registrations`, {
    method: "GET",
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`,
    },
  });

  const data = await res.json();
  if (res.ok) renderRegistrations(data);
}

/* =========================
   RENDER
========================= */
function renderRegistrations(data) {
  const container = document.getElementById("days");
  container.innerHTML = "";

  const times = ["07:30", "17:00"];

  const grouped = {};
  data.forEach(r => {
    if (!grouped[r.date]) grouped[r.date] = [];
    grouped[r.date].push(r);
  });

  for (let i = 1; i <= 7; i++) {
    let d = new Date();
    d.setDate(d.getDate() + i);
    let date = d.toISOString().split("T")[0];

    const card = document.createElement("div");
    card.className = "card";

    let html = `<b>${date}</b><br><br>`;

    times.forEach(time => {
      const booking = (grouped[date] || []).find(x => x.time === time);

      const key = `${date}|${time}`;
      const isSelected = selected.includes(key);

      if (booking) {
        html += `
          <div class="slot selected">
            ${time} - ${booking.name}

            <button onclick="deleteRegistration('${booking.id}')"
              style="float:left;background:red;color:white;border:none;border-radius:6px;padding:4px 8px;">
              ❌
            </button>
          </div>
        `;
      } else {
        html += `
          <div class="slot clickable ${isSelected ? "selected" : ""}"
               onclick="toggleSlot('${key}')">
            ${time}
          </div>
        `;
      }
    });

    card.innerHTML = html;
    container.appendChild(card);
  }
}

/* =========================
   TOGGLE SLOT
========================= */
function toggleSlot(key) {
  const i = selected.indexOf(key);

  if (i === -1) {
    selected.push(key);
  } else {
    selected.splice(i, 1);
  }

  fetchRegistrations();
}

/* =========================
   CREATE
========================= */
async function submitForm() {
  const name = document.getElementById("name").value.trim();

  const { data: { session } } = await client.auth.getSession();
  if (!session) return alert("צריך להתחבר");

  if (!name || selected.length === 0) {
    return alert("בחר שם ושעות");
  }

  const res = await fetch(`${SUPABASE_URL}/functions/v1/create-registration`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`,
      "Content-Type": "application/json",
    },
    body: JSON.stringify({ name, slots: selected }),
  });

  const data = await res.json();

  if (!res.ok) return alert(data.error);

  selected = [];
  fetchRegistrations();
}

/* =========================
   DELETE
========================= */
async function deleteRegistration(id) {
  const { data: { session } } = await client.auth.getSession();
  if (!session?.access_token) return;

  const res = await fetch(`${SUPABASE_URL}/functions/v1/delete-registration`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`,
      "Content-Type": "application/json",
    },
    body: JSON.stringify({ id }),
  });

  const data = await res.json();

  if (!res.ok) return alert(data.error);

  fetchRegistrations();
}

/* =========================
   INIT
========================= */
window.addEventListener("load", async () => {
  await client.auth.getSession();
  checkSession();
});

client.auth.onAuthStateChange(() => {
  checkSession();
});
</script>

</body>
</html>
