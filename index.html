<!DOCTYPE html>

<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פיקלבול בת חפר 🎾</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  box-sizing: border-box;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.login { background: #6366f1; color: white; }
.primary { background: #38bdf8; }

.slot {
  background: #475569;
  padding: 10px;
  margin-top: 6px;
  border-radius: 8px;
  cursor: pointer;
}

.slot.selected {
  background: #22c55e;
}

#userBox {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.9;
}
</style>

</head>

<body dir="rtl">

<div class="container">

  <h1>🎾 פיקלבול בת חפר</h1>

  <!-- AUTH -->

  <div class="card" id="authBox">
    <input id="email" placeholder="אימייל להתחברות">
    <button class="login" onclick="login()">🔐 התחבר</button>
  </div>

  <!-- APP -->

  <div id="appBox" style="display:none;">
    <div class="card">
      <input id="name" placeholder="שם מלא">
      <button class="primary" onclick="submitForm()">הרשמה</button>
    </div>


<div id="days"></div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://svasvbooeixwbfgyteml.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2YXN2Ym9vZWl4d2JmZ3l0ZW1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODE3MDAsImV4cCI6MjA5MTQ1NzcwMH0.SseXrAMUs8hgIxT0jOccH8svqaPR7lgOAWNcYvDvdo0";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let selected = [];
let currentUserId = null;
let holidaysMap = {};

// ================= HOLIDAYS =================
async function loadHolidays(year = 2026) {
  const res = await fetch(
    `https://www.hebcal.com/hebcal?v=1&cfg=json&year=${year}&lg=he&maj=on`
  );

  const data = await res.json();

  holidaysMap = {};

  data.items.forEach(item => {
    if (item.category === "holiday" && item.date) {
      const key = item.date.trim().substring(0, 10);
      if (!holidaysMap[key]) holidaysMap[key] = [];
      holidaysMap[key].push(item.title);
    }
  });

  console.log("HOLIDAYS LOADED:", holidaysMap);
}

// ================= FETCH =================
async function fetchRegistrations() {
  const { data: { session } } = await client.auth.getSession();
  if (!session) return;

  currentUserId = session.user.id;

  const res = await fetch(`${SUPABASE_URL}/functions/v1/get-registrations`, {
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`,
    }
  });

  const data = await res.json();
  renderRegistrations(data);
}

// ================= DELETE =================
async function deleteRegistration(id) {
  const { data: { session } } = await client.auth.getSession();

  await fetch(`${SUPABASE_URL}/functions/v1/delete-registration`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`,
    },
    body: JSON.stringify({ id })
  });

  fetchRegistrations();
}

// ================= SLOT LOGIC =================
function toggleSlot(date, time, el) {
  const index = selected.findIndex(
    s => s.date === date && s.time === time
  );

  if (index > -1) {
    selected.splice(index, 1);
    el.classList.remove("selected");
  } else {
    selected.push({ date, time });
    el.classList.add("selected");
  }
}

function isSelected(date, time) {
  return selected.some(
    s => s.date === date && s.time === time
  );
}

// ================= RENDER =================
function renderRegistrations(data) {
  const container = document.getElementById("days");
  container.innerHTML = "";

  const times = ["07:30", "17:00"];

  const grouped = {};
  data.forEach(r => {
    if (!grouped[r.date]) grouped[r.date] = [];
    grouped[r.date].push(r);
  });

  for (let i = 1; i <= 7; i++) {
    let d = new Date();
    d.setDate(d.getDate() + i);

    // ✅ stable ISO date (NO timezone bugs)
    const date = d.toLocaleDateString("en-CA");

    const hebrewDay = d.toLocaleDateString("he-IL", { weekday: "long" });

    const holiday = holidaysMap[date];

    const card = document.createElement("div");
    card.className = "card";

    let html = `
      <b>${hebrewDay} - ${date}</b>
      ${
        holiday
          ? `<div style="color:#fbbf24;font-weight:bold">📅 ${holiday.join(" | ")}</div>`
          : ""
      }
      <br><br>
    `;

    times.forEach(time => {
      const bookings = (grouped[date] || []).filter(x => x.time === time);

      html += `
        <div class="slot ${isSelected(date, time) ? 'selected' : ''}"
             onclick="toggleSlot('${date}', '${time}', this)">
          
          <b>${time} (${bookings.length})</b>

          <div style="margin-top:6px;font-size:13px;">
            ${
              bookings.length
                ? bookings.map(b => `
                    <div style="display:flex;justify-content:space-between">
                      <span>👤 ${b.name}</span>
                      ${
                        b.user_id === currentUserId
                          ? `<button onclick="deleteRegistration('${b.id}')"
                              style="background:red;color:white;border:none;border-radius:6px;padding:2px 6px;font-size:12px">
                              ❌
                             </button>`
                          : ""
                      }
                    </div>
                  `).join("")
                : "זמין"
            }
          </div>

        </div>
      `;
    });

    card.innerHTML = html;
    container.appendChild(card);
  }
}

// ================= LOGIN =================
async function login() {
  const email = document.getElementById("email").value;

  const { error } = await client.auth.signInWithOtp({
    email,
    options: {
      emailRedirectTo: "https://natandlankri.github.io/pickelball-app/"
    }
  });

  if (error) alert(error.message);
  else alert("נשלח מייל 📧");
}

// ================= SUBMIT =================
async function submitForm() {
  const name = document.getElementById("name").value;

  const { data: { session } } = await client.auth.getSession();
  if (!session) return alert("צריך להתחבר");

  if (selected.length === 0) return alert("בחר לפחות מועד אחד");

  await fetch(`${SUPABASE_URL}/functions/v1/create-registration`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`,
    },
    body: JSON.stringify({
      name,
      slots: selected
    })
  });

  selected = [];
  fetchRegistrations();
}

// ================= SESSION =================
async function checkSession() {
  const { data: { session } } = await client.auth.getSession();

  if (session) {
    document.getElementById("authBox").style.display = "none";
    document.getElementById("appBox").style.display = "block";
    fetchRegistrations();
  }
}

window.addEventListener("load", async () => {
  await loadHolidays(2026);
  checkSession();
});

client.auth.onAuthStateChange(() => {
  checkSession();
});
</script>

</body>
</html>
