<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>פיקלבול 🎾</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.login { background: #6366f1; color: white; }
.primary { background: #38bdf8; }

.slot {
  background: #475569;
  padding: 8px;
  margin-top: 6px;
  border-radius: 8px;
  cursor: pointer;
}

.slot.selected {
  background: #22c55e;
}

#loader {
  display: none;
  font-size: 12px;
  opacity: 0.7;
  margin-top: 5px;
}

#userBox {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.9;
}
</style>
</head>

<body dir="rtl">

<div class="container">

  <h1>🎾 פיקלבול</h1>

  <!-- AUTH -->
  <div class="card" id="authBox">
    <input id="email" placeholder="אימייל להתחברות" />
    <button class="login" onclick="login()">🔐 התחבר</button>
    <div id="loader">בודק הרשאה...</div>
    <div id="errorBox" style="color:red;"></div>
  </div>

  <!-- APP -->
  <div id="appBox" style="display:none;">
    <div class="card">
      <input id="name" placeholder="שם מלא" />
      <button class="primary" onclick="submitForm()">הרשמה</button>
    </div>

    <div id="days"></div>
  </div>

  <div id="userBox"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://svasvbooeixwbfgyteml.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2YXN2Ym9vZWl4d2JmZ3l0ZW1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODE3MDAsImV4cCI6MjA5MTQ1NzcwMH0.SseXrAMUs8hgIxT0jOccH8svqaPR7lgOAWNcYvDvdo0";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let selected = [];

/* =========================
   SESSION
========================= */
async function checkSession() {
  const { data: { session } } = await client.auth.getSession();
  currentUser = session?.user || null;

  document.getElementById("authBox").style.display = currentUser ? "none" : "block";
  document.getElementById("appBox").style.display = currentUser ? "block" : "none";

  if (currentUser) {
    document.getElementById("userBox").innerHTML =
      `<p>מחובר כ: <b>${currentUser.email}</b></p>`;
    fetchRegistrations();
  }
}

/* =========================
   LOGIN
========================= */
async function login() {
  const email = document.getElementById("email").value.trim();

  const { error } = await client.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.href }
  });

  if (error) {
    document.getElementById("errorBox").innerText = error.message;
    return;
  }

  alert("נשלח מייל 📧");
}

/* =========================
   FETCH BOOKINGS
========================= */
async function fetchRegistrations() {
  const res = await fetch(`${SUPABASE_URL}/functions/v1/get-registrations`);
  const data = await res.json();

  render(data);
}

/* =========================
   RENDER UI
========================= */
function render(data) {
  const container = document.getElementById("days");
  container.innerHTML = "";

  const times = ["07:30", "17:00"];

  const grouped = {};
  data.forEach(r => {
    if (!grouped[r.date]) grouped[r.date] = [];
    grouped[r.date].push(r);
  });

  for (let i = 1; i <= 7; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    const date = d.toISOString().split("T")[0];

    const card = document.createElement("div");
    card.className = "card";

    let html = `<b>${date}</b><br><br>`;

    times.forEach(time => {
      const booking = (grouped[date] || []).find(x => x.time === time);
      const isMine = booking?.user_id === currentUser?.id;

      html += `
        <div class="slot ${booking ? "selected" : ""}"
          ${isMine ? `onclick="deleteSlot('${booking.id}')"` : ""}>
          ${time} ${booking ? " - " + booking.name : ""}
          ${isMine ? " ❌" : ""}
        </div>
      `;
    });

    card.innerHTML = html;
    container.appendChild(card);
  }
}

/* =========================
   CREATE
========================= */
async function submitForm() {
  const name = document.getElementById("name").value;

  const { data: { session } } = await client.auth.getSession();

  await fetch(`${SUPABASE_URL}/functions/v1/create-registration`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name,
      slots: selected
    })
  });

  selected = [];
  fetchRegistrations();
}

/* =========================
   DELETE
========================= */
async function deleteSlot(id) {
  const { data: { session } } = await client.auth.getSession();

  await fetch(`${SUPABASE_URL}/functions/v1/delete-registration`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ id })
  });

  fetchRegistrations();
}

/* =========================
   INIT
========================= */
window.addEventListener("load", checkSession);
client.auth.onAuthStateChange(checkSession);
</script>

</body>
</html>
