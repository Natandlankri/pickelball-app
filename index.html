<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> בת חפר פיקלבול 🎾</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

.container { max-width: 500px; margin: auto; padding: 20px; }
h1 { text-align: center; }

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

.days {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.day {
  background: #334155;
  padding: 12px;
  border-radius: 12px;
  cursor: pointer;
}

.day.selected { background: #22c55e; }

.count { font-size: 12px; opacity: 0.8; }
.players { font-size: 12px; margin-top: 5px; }

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.primary { background: #38bdf8; }
.login { background: #6366f1; color: white; }
.delete-btn {
  background: #ef4444;
  color: white;
  border: none;
  padding: 4px 8px;
  border-radius: 6px;
}
</style>
</head>

<body dir="rtl">

<div class="container">
<h1>🎾 פיקלבול</h1>

<div class="card">

<!-- LOGIN -->
<input id="email" placeholder="אימייל להתחברות">
<button class="login" onclick="login()">🔐 התחבר (Magic Link)</button>

<hr>

<!-- APP -->
<div id="userBox"></div>

<input id="name" placeholder="שם מלא">

<div class="days" id="days"></div>

<button class="primary" onclick="submitForm()">הרשמה</button>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://svasvbooeixwbfgyteml.supabase.co";
const SUPABASE_ANON_KEY = "YOUR_KEY";

const GET_URL = `${SUPABASE_URL}/functions/v1/get-registrations`;
const CREATE_URL = `${SUPABASE_URL}/functions/v1/create-registration`;
const DELETE_URL = `${SUPABASE_URL}/functions/v1/delete-registration`;

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let selected = [];
let dayMap = {};

// =========================
// 🔐 LOGIN (MAGIC LINK FIXED)
// =========================
async function login() {
  const email = document.getElementById("email").value.trim();

  if (!email) {
    alert("הכנס אימייל");
    return;
  }

  const { error } = await client.auth.signInWithOtp({
    email,
    options: {
      emailRedirectTo: "https://natandlankri.github.io/pickelball-app/"
    }
  });

  if (error) {
    alert("שגיאה בשליחת מייל");
    return;
  }

  alert("נשלח לך מייל התחברות 📧");
}

// =========================
// 👤 USER STATE
// =========================
async function getUser() {
  const { data } = await client.auth.getUser();
  return data?.user;
}

async function showUser() {
  const user = await getUser();
  const box = document.getElementById("userBox");

  if (!user) {
    box.innerHTML = "<p>לא מחובר</p>";
    return;
  }

  box.innerHTML = `
    <p>מחובר כ: <b>${user.email}</b></p>
    <button onclick="logout()">יציאה</button>
  `;
}

async function logout() {
  await client.auth.signOut();
  location.reload();
}

// =========================
// 📅 BUILD DAYS
// =========================
function buildDays() {
  const container = document.getElementById("days");

  for (let i = 1; i <= 7; i++) {
    let d = new Date();
    d.setDate(d.getDate() + i);

    let iso = new Date(d.getTime() - d.getTimezoneOffset() * 60000)
      .toISOString().split("T")[0];

    let label = d.toLocaleDateString("he-IL", {
      weekday: "short",
      day: "2-digit",
      month: "2-digit"
    });

    let div = document.createElement("div");
    div.className = "day";

    div.innerHTML = `
      <div>${label}</div>
      <div class="count">טוען...</div>
      <div class="players"></div>
    `;

    div.onclick = () => {
      div.classList.toggle("selected");

      if (selected.includes(iso)) {
        selected = selected.filter(x => x !== iso);
      } else {
        selected.push(iso);
      }
    };

    dayMap[iso] = div;
    container.appendChild(div);
  }
}

// =========================
// 📥 LOAD
// =========================
async function load() {
  const res = await fetch(GET_URL, {
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`
    }
  });

  const data = await res.json();
  const grouped = {};

  (data || []).forEach(r => {
    if (!grouped[r.date]) grouped[r.date] = [];
    grouped[r.date].push(r);
  });

  for (let date in dayMap) {
    const el = dayMap[date];
    const list = grouped[date] || [];

    el.querySelector(".count").innerText = `${list.length} שחקנים`;

    el.querySelector(".players").innerHTML = list.map(p => `
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span>${p.name}</span>
        <button class="delete-btn" onclick="deleteRow('${p.id}')">❌</button>
      </div>
    `).join("");
  }
}

// =========================
// ➕ SUBMIT (AUTH)
// =========================
async function submitForm() {
  const name = document.getElementById("name").value.trim();
  const user = await getUser();

  if (!user) {
    alert("יש להתחבר קודם");
    return;
  }

  if (!name || selected.length === 0) {
    alert("מלא הכל");
    return;
  }

  await fetch(CREATE_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`
    },
    body: JSON.stringify({
      name,
      email: user.email,
      dates: selected
    })
  });

  selected = [];
  document.querySelectorAll(".day.selected")
    .forEach(d => d.classList.remove("selected"));

  await load();
}

// =========================
// 🗑 DELETE (AUTH SECURE)
// =========================
async function deleteRow(id) {
  const { data: { session } } = await client.auth.getSession();

  if (!session) {
    alert("צריך להתחבר");
    return;
  }

  if (!confirm("למחוק את ההרשמה שלך?")) return;

  const res = await fetch(DELETE_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`
    },
    body: JSON.stringify({ id })
  });

  const result = await res.json();

  if (!res.ok) {
    alert(result.error || "שגיאה במחיקה");
    return;
  }

  await load();
}

// =========================
// INIT
// =========================
buildDays();
load();
showUser();
</script>

</body>
</html>
