<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פיקלבול 🎾</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.login {
  background: #6366f1;
  color: white;
}

#userBox {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.9;
}

.error {
  color: #ef4444;
  margin-top: 10px;
}
</style>
</head>

<body dir="rtl">

<div class="container">
  <h1>🎾 פיקלבול</h1>

  <div class="card">

    <input id="email" placeholder="אימייל להתחברות">
    <button class="login" onclick="login()">🔐 התחבר</button>

    <div id="errorBox" class="error"></div>

    <div id="userBox"></div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://svasvbooeixwbfgyteml.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2YXN2Ym9vZWl4d2JmZ3l0ZW1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODE3MDAsImV4cCI6MjA5MTQ1NzcwMH0.SseXrAMUs8hgIxT0jOccH8svqaPR7lgOAWNcYvDvdo0";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// =========================
// 🔐 LOGIN + whitelist check
// =========================
async function login() {
  const email = document.getElementById("email").value.trim().toLowerCase();

  const errorBox = document.getElementById("errorBox");
  errorBox.innerText = "";

  if (!email) {
    errorBox.innerText = "נא להזין אימייל";
    return;
  }

  try {
    // =========================
    // 🔍 בדיקת whitelist
    // =========================
    const res = await fetch(`${SUPABASE_URL}/functions/v1/check-user`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`, // 🔥 פותר CORS/Edge issues
      },
      body: JSON.stringify({ email }),
    });

    const data = await res.json();

    if (!res.ok) {
      errorBox.innerText = data.error || "שגיאה בבדיקה";
      return;
    }

    if (!data.allowed) {
      errorBox.innerText = "האימייל לא מורשה ❌";
      return;
    }

    // =========================
    // 📧 Magic Link
    // =========================
    const { error } = await client.auth.signInWithOtp({
      email,
      options: {
        emailRedirectTo: window.location.href,
      },
    });

    if (error) {
      console.error(error);
      errorBox.innerText = "שגיאה בשליחת מייל";
      return;
    }

    alert("נשלח מייל 📧");

  } catch (err) {
    console.error(err);
    errorBox.innerText = "שגיאה בחיבור לשרת";
  }
}

// =========================
// UI
// =========================
async function updateAuthUI() {
  const { data: { user } } = await client.auth.getUser();

  const emailInput = document.getElementById("email");
  const userBox = document.getElementById("userBox");

  if (user) {
    emailInput.style.display = "none";

    userBox.innerHTML = `
      <p>מחובר כ: <b>${user.email}</b></p>
    `;
  } else {
    emailInput.style.display = "block";
    userBox.innerHTML = "";
  }
}

updateAuthUI();
client.auth.onAuthStateChange(() => updateAuthUI());
</script>

</body>
</html>
