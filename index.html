<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פיקלבול בת חפר 🎾</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

button {
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.login { background: #6366f1; color: white; }
.primary { background: #38bdf8; }

.slot {
  background: #475569;
  padding: 10px;
  margin-top: 6px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.delete-btn {
  background: #ef4444;
  border: none;
  color: white;
  border-radius: 6px;
  padding: 4px 8px;
  cursor: pointer;
}

.slot.selected {
  background: #22c55e;
}
</style>
</head>

<body dir="rtl">

<div class="container">

  <h1>🎾 פיקלבול בת חפר</h1>

  <!-- AUTH -->
  <div class="card" id="authBox">
    <input id="email" placeholder="אימייל להתחברות">
    <button class="login" onclick="login()">🔐 התחבר</button>
  </div>

  <!-- APP -->
  <div id="appBox" style="display:none;">
    <div class="card">
      <input id="name" placeholder="שם מלא">
      <button class="primary" onclick="submitForm()">הרשמה</button>
    </div>

    <div id="days"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://svasvbooeixwbfgyteml.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2YXN2Ym9vZWl4d2JmZ3l0ZW1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODE3MDAsImV4cCI6MjA5MTQ1NzcwMH0.SseXrAMUs8hgIxT0jOccH8svqaPR7lgOAWNcYvDvdo0";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let selected = [];

// =========================
// FIXED INIT (IMPORTANT)
// =========================
window.addEventListener("load", async () => {

  // wait for magic link session restore
  await new Promise(r => setTimeout(r, 500));

  const { data: { session } } = await client.auth.getSession();

  if (session) {
    showApp();
    await fetchRegistrations();
  }

});

// =========================
// AUTH LISTENER FIX
// =========================
client.auth.onAuthStateChange(async (_event, session) => {
  if (session) {
    showApp();
    await fetchRegistrations();
  }
});

// =========================
// SHOW UI
// =========================
function showApp() {
  document.getElementById("authBox").style.display = "none";
  document.getElementById("appBox").style.display = "block";
}

// =========================
// LOGIN
// =========================
async function login() {
  const email = document.getElementById("email").value;

  await client.auth.signInWithOtp({
    email,
    options: {
      emailRedirectTo: window.location.href
    }
  });

  alert("נשלח מייל 📧");
}

// =========================
// FETCH REGISTRATIONS
// =========================
async function fetchRegistrations() {
  const { data: { session } } = await client.auth.getSession();
  if (!session) return;

  const res = await fetch(`${SUPABASE_URL}/functions/v1/get-registrations`, {
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`,
    }
  });

  const data = await res.json();
  render(data);
}

// =========================
// DELETE
// =========================
async function deleteRegistration(id) {
  const { data: { session } } = await client.auth.getSession();

  const res = await fetch(`${SUPABASE_URL}/functions/v1/delete-registration`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`,
    },
    body: JSON.stringify({ id }),
  });

  if (res.ok) {
    fetchRegistrations();
  }
}

// =========================
// RENDER
// =========================
function render(data) {
  const container = document.getElementById("days");
  container.innerHTML = "";

  const times = ["07:30", "17:00"];

  const grouped = {};
  data.forEach(r => {
    if (!grouped[r.date]) grouped[r.date] = [];
    grouped[r.date].push(r);
  });

  for (let i = 1; i <= 7; i++) {
    let d = new Date();
    d.setDate(d.getDate() + i);
    let date = d.toISOString().split("T")[0];

    const card = document.createElement("div");
    card.className = "card";

    let html = `<b>${date}</b><br><br>`;

    times.forEach(time => {
      const booked = (grouped[date] || []).find(x => x.time === time);

      if (booked) {
        html += `
          <div class="slot">
            <span>${time} - ${booked.name}</span>
            <button class="delete-btn" onclick="deleteRegistration('${booked.id}')">🗑️</button>
          </div>
        `;
      } else {
        html += `
          <div class="slot">
            ${time}
          </div>
        `;
      }
    });

    card.innerHTML = html;
    container.appendChild(card);
  }
}
</script>

</body>
</html>
