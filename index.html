<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>פיקלבול 🎾</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.login { background: #6366f1; color: white; }
.primary { background: #38bdf8; }

.slot {
  background: #475569;
  padding: 8px;
  margin-top: 6px;
  border-radius: 8px;
  display:flex;
  justify-content: space-between;
  align-items:center;
  cursor:pointer;
}

.slot.selected {
  background: #22c55e;
}

.slot.booked {
  background: #334155;
}

.remove {
  background: transparent;
  border: none;
  color: #ef4444;
  font-size: 16px;
  cursor: pointer;
}

#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #111827;
  color: white;
  padding: 10px 14px;
  border-radius: 10px;
  display:none;
}
</style>
</head>

<body dir="rtl">

<div class="container">

<h1>🎾 פיקלבול</h1>

<div class="card" id="authBox">
  <input id="email" placeholder="אימייל להתחברות"/>
  <button class="login" onclick="login()">🔐 התחבר</button>
</div>

<div id="appBox" style="display:none;">
  <div class="card">
    <input id="name" placeholder="שם מלא"/>
    <button class="primary" onclick="submitForm()">הרשמה</button>
  </div>

  <div id="days"></div>
</div>

<div id="toast"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://svasvbooeixwbfgyteml.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2YXN2Ym9vZWl4d2JmZ3l0ZW1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODE3MDAsImV4cCI6MjA5MTQ1NzcwMH0.SseXrAMUs8hgIxT0jOccH8svqaPR7lgOAWNcYvDvdo0";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let selected = [];

// ================= TOAST =================
function toast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2500);
}

// ================= AUTH =================
async function login() {
  const email = document.getElementById("email").value;

  await client.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.href }
  });

  toast("נשלח מייל התחברות 📧");
}

// ================= LOAD DATA =================
async function fetchRegistrations() {
  const { data: { session } } = await client.auth.getSession();
  if (!session) return;

  const res = await fetch(`${SUPABASE_URL}/functions/v1/get-registrations`, {
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`
    }
  });

  const data = await res.json();
  render(data);
}

// ================= RENDER =================
function render(data) {
  const container = document.getElementById("days");
  container.innerHTML = "";

  const times = ["07:30", "17:00"];

  const grouped = {};
  data.forEach(r => {
    if (!grouped[r.date]) grouped[r.date] = [];
    grouped[r.date].push(r);
  });

  for (let i = 1; i <= 7; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    const date = d.toISOString().split("T")[0];

    const card = document.createElement("div");
    card.className = "card";

    let html = `<b>${date}</b><br><br>`;

    times.forEach(time => {
      const booking = (grouped[date] || []).find(x => x.time === time);

      if (booking) {
        html += `
          <div class="slot booked">
            ${time} - ${booking.name}
            <button class="remove" onclick="removeBooking(${booking.id})">✖</button>
          </div>
        `;
      } else {
        const key = `${date}|${time}`;
        const isSelected = selected.includes(key);

        html += `
          <div class="slot ${isSelected ? "selected" : ""}"
               onclick="toggleSlot('${date}','${time}')">
            ${time}
          </div>
        `;
      }
    });

    card.innerHTML = html;
    container.appendChild(card);
  }
}

// ================= SELECT SLOT =================
function toggleSlot(date, time) {
  const key = `${date}|${time}`;

  if (selected.includes(key)) {
    selected = selected.filter(x => x !== key);
  } else {
    selected.push(key);
  }

  fetchRegistrations();
}

// ================= CREATE =================
async function submitForm() {
  const name = document.getElementById("name").value;
  const { data: { session } } = await client.auth.getSession();

  if (!session) return toast("צריך להתחבר");
  if (!name || selected.length === 0) return toast("בחר שם ושעה");

  const res = await fetch(`${SUPABASE_URL}/functions/v1/create-registration`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`
    },
    body: JSON.stringify({ name, slots: selected })
  });

  const data = await res.json();

  if (!res.ok) return toast(data.error || "שגיאה");

  selected = [];
  toast("נרשמת בהצלחה 🎾");
  fetchRegistrations();
}

// ================= DELETE =================
async function removeBooking(id) {
  const { data: { session } } = await client.auth.getSession();

  const res = await fetch(`${SUPABASE_URL}/functions/v1/delete-registration`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`
    },
    body: JSON.stringify({ id })
  });

  const data = await res.json();

  if (!res.ok) return toast(data.error || "מחיקה נכשלה");

  toast("נמחק בהצלחה 🗑️");
  fetchRegistrations();
}

// ================= INIT =================
window.addEventListener("load", async () => {
  const { data } = await client.auth.getSession();

  if (data.session) {
    document.getElementById("authBox").style.display = "none";
    document.getElementById("appBox").style.display = "block";
    fetchRegistrations();
  }
});

client.auth.onAuthStateChange(() => {
  fetchRegistrations();
});
</script>

</body>
</html>
