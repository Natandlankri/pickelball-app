<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פיקלבול בת חפר 🎾</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

.container { max-width: 500px; margin: auto; padding: 20px; }
h1 { text-align: center; }

input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

.day {
  background: #1e293b;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
}

.slot-box {
  background: #0f172a;
  margin-top: 8px;
  padding: 10px;
  border-radius: 10px;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.primary { background: #38bdf8; }
.login { background: #6366f1; color: white; }
</style>
</head>

<body dir="rtl">

<div class="container">

<h1>🎾 פיקלבול בת חפר</h1>

<!-- AUTH -->
<input id="email" placeholder="אימייל להתחברות">
<button class="login" onclick="login()">🔐 התחבר</button>

<hr>

<div id="userBox"></div>

<!-- APP -->
<div id="appBox" style="display:none">

<input id="name" placeholder="שם מלא">

<div id="days"></div>

<button class="primary" onclick="submitForm()">הרשמה</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://svasvbooeixwbfgyteml.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2YXN2Ym9vZWl4d2JmZ3l0ZW1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODE3MDAsImV4cCI6MjA5MTQ1NzcwMH0.SseXrAMUs8hgIxT0jOccH8svqaPR7lgOAWNcYvDvdo0";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const TIMES = ["08:00", "10:00", "18:00"];

let selected = [];

// =========================
// LOGIN
// =========================
async function login() {
  const email = document.getElementById("email").value.trim();

  if (!email) return alert("הכנס אימייל");

  const { error } = await supabase.auth.signInWithOtp({
    email,
    options: {
      emailRedirectTo: "https://natandlankri.github.io/pickelball-app/"
    }
  });

  if (error) return alert("שגיאה");
  alert("נשלח מייל 📧");
}

// =========================
// AUTH UI
// =========================
async function updateAuthUI() {
  const { data: { user } } = await supabase.auth.getUser();

  const appBox = document.getElementById("appBox");

  if (user) {
    appBox.style.display = "block";

    document.getElementById("email").style.display = "none";
    document.querySelector(".login").style.display = "none";

    document.getElementById("userBox").innerHTML = `
      <p>מחובר כ: <b>${user.email}</b></p>
    `;
  } else {
    appBox.style.display = "none";

    document.getElementById("email").style.display = "block";
    document.querySelector(".login").style.display = "block";

    document.getElementById("userBox").innerHTML = "";
  }
}

// =========================
// BUILD DAYS
// =========================
function buildDays() {
  const container = document.getElementById("days");

  for (let i = 1; i <= 7; i++) {
    let d = new Date();
    d.setDate(d.getDate() + i);

    let date = new Date(d.getTime() - d.getTimezoneOffset() * 60000)
      .toISOString().split("T")[0];

    const div = document.createElement("div");
    div.className = "day";

    div.innerHTML = `
      <b>${date}</b>

      ${TIMES.map(t => `
        <div class="slot-box">
          <button onclick="selectSlot('${date}','${t}', this)">
            🕒 ${t}
          </button>

          <div id="list-${date}-${t}" style="font-size:12px;margin-top:5px"></div>
        </div>
      `).join("")}
    `;

    container.appendChild(div);
  }
}

// =========================
// SELECT SLOT
// =========================
function selectSlot(date, time, el) {
  const key = `${date}|${time}`;

  if (selected.includes(key)) {
    selected = selected.filter(x => x !== key);
    el.style.background = "#1e293b";
  } else {
    selected.push(key);
    el.style.background = "#22c55e";
  }
}

// =========================
// LOAD DATA (players + count)
// =========================
async function load() {
  const res = await fetch(`${SUPABASE_URL}/functions/v1/get-registrations`, {
    headers: {
      apikey: SUPABASE_ANON_KEY
    }
  });

  const data = await res.json();

  const grouped = {};

  data.forEach(r => {
    const key = `${r.date}|${r.time}`;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(r.name);
  });

  for (let i = 1; i <= 7; i++) {
    let d = new Date();
    d.setDate(d.getDate() + i);

    let date = new Date(d.getTime() - d.getTimezoneOffset() * 60000)
      .toISOString().split("T")[0];

    TIMES.forEach(time => {
      const key = `${date}|${time}`;
      const users = grouped[key] || [];

      const el = document.getElementById(`list-${date}-${time}`);
      if (!el) return;

      el.innerHTML = `
        👥 ${users.length} שחקנים<br>
        ${users.length ? users.map(u => `• ${u}`).join("<br>") : "אין נרשמים"}
      `;
    });
  }
}

// =========================
// SUBMIT (FIXED INVOKE)
// =========================
async function submitForm() {
  const name = document.getElementById("name").value.trim();
  const { data: { user } } = await supabase.auth.getUser();

  if (!user) return alert("יש להתחבר");
  if (!name || selected.length === 0) return alert("בחר שעות");

  const { data, error } = await supabase.functions.invoke("create-registration", {
    body: {
      name,
      slots: selected
    }
  });

  if (error) {
    console.error(error);
    return alert("שגיאה בהרשמה");
  }

  selected = [];
  document.querySelectorAll("button").forEach(b => {
    if (b.onclick) b.style.background = "#1e293b";
  });

  alert("נרשמת בהצלחה 🎾");

  load();
}

// INIT
buildDays();
updateAuthUI();
load();
supabase.auth.onAuthStateChange(() => updateAuthUI());
</script>

</body>
</html>
