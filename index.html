<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פיקלבול 🎾</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.login { background: #6366f1; color: white; }
.primary { background: #38bdf8; }

.slot {
  background: #475569;
  padding: 8px;
  margin-top: 6px;
  border-radius: 8px;
  cursor: pointer;
}

.slot.selected {
  background: #22c55e;
}

#loader {
  display: none;
  font-size: 12px;
  opacity: 0.7;
  margin-top: 5px;
}

#userBox {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.9;
}
</style>
</head>

<body dir="rtl">

<div class="container">

  <h1>🎾 פיקלבול</h1>

  <!-- AUTH -->
  <div class="card" id="authBox">
    <input id="email" placeholder="אימייל להתחברות">
    <button class="login" onclick="login()">🔐 התחבר</button>
    <div id="loader">בודק הרשאה...</div>
    <div id="errorBox" style="color:#ef4444;margin-top:8px;"></div>
  </div>

  <!-- APP -->
  <div id="appBox" style="display:none;">

    <div class="card">
      <input id="name" placeholder="שם מלא">
      <button class="primary" onclick="submitForm()">הרשמה</button>
    </div>

    <div id="days"></div>

  </div>

  <div id="userBox"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://svasvbooeixwbfgyteml.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2YXN2Ym9vZWl4d2JmZ3l0ZW1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODE3MDAsImV4cCI6MjA5MTQ1NzcwMH0.SseXrAMUs8hgIxT0jOccH8svqaPR7lgOAWNcYvDvdo0";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true,
    storage: localStorage,
  },
});
  
let selected = [];

async function login() {
  const email = document.getElementById("email").value.trim().toLowerCase();
  const loader = document.getElementById("loader");
  const errorBox = document.getElementById("errorBox");

  errorBox.innerText = "";
  loader.style.display = "block";

  if (!email) {
    loader.style.display = "none";
    errorBox.innerText = "נא להזין אימייל";
    return;
  }

  try {
const res = await fetch(`${SUPABASE_URL}/functions/v1/check-user`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
      },
      body: JSON.stringify({ email }),
    });

    const data = await res.json();

    if (!res.ok || !data.allowed) {
      loader.style.display = "none";
      errorBox.innerText = "האימייל לא מורשה ❌";
      return;
    }

    // 2. Magic link רק אם מותר
    const { error } = await client.auth.signInWithOtp({
      email,
      options: {
        emailRedirectTo: window.location.href,
      },
    });

    loader.style.display = "none";

    if (error) {
      errorBox.innerText = "שגיאה בשליחת מייל";
      return;
    }

    alert("נשלח מייל 📧");

  } catch (err) {
    loader.style.display = "none";
    errorBox.innerText = "שגיאה בשרת";
  }
}

// =========================
// 📅 DAYS
// =========================
function buildDays() {
  const container = document.getElementById("days");
  const times = ["18:00", "19:00", "20:00"];

  for (let i = 1; i <= 7; i++) {
    let d = new Date();
    d.setDate(d.getDate() + i);

    let date = d.toISOString().split("T")[0];

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `<b>${date}</b>`;

    times.forEach(time => {
      const slot = document.createElement("div");
      slot.className = "slot";

      const key = `${date}|${time}`;
      slot.innerText = time;

      slot.onclick = () => {
        slot.classList.toggle("selected");

        if (selected.includes(key)) {
          selected = selected.filter(x => x !== key);
        } else {
          selected.push(key);
        }
      };

      card.appendChild(slot);
    });

    container.appendChild(card);
  }
}

// =========================
// 📝 SUBMIT (JWT ONLY HERE)
// =========================
async function submitForm() {
  const name = document.getElementById("name").value.trim();

  const { data: { session } } = await client.auth.getSession();

  if (!session) {
    alert("צריך להתחבר");
    return;
  }

  if (!name || selected.length === 0) {
    alert("בחר שם ושעות");
    return;
  }

  const res = await fetch(`${SUPABASE_URL}/functions/v1/create-registration`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`,
    },
    body: JSON.stringify({
      name,
      slots: selected
    }),
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.error || "שגיאה בהרשמה");
    return;
  }

  alert("נרשמת בהצלחה 🎾");
  selected = [];
}

// =========================
// 🔄 AUTH STATE
// =========================
async function checkSession() {
  const { data: { user } } = await client.auth.getUser();

  const authBox = document.getElementById("authBox");
  const appBox = document.getElementById("appBox");
  const userBox = document.getElementById("userBox");

  if (user) {
    authBox.style.display = "none";
    appBox.style.display = "block";
    userBox.innerHTML = `<p>מחובר כ: <b>${user.email}</b></p>`;
  } else {
    authBox.style.display = "block";
    appBox.style.display = "none";
    userBox.innerHTML = "";
  }
}

buildDays();
checkSession();

client.auth.onAuthStateChange(() => checkSession());
</script>

</body>
</html>
