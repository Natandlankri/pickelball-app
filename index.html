<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פיקלבול 🎾</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.login {
  background: #6366f1;
  color: white;
}

.primary {
  background: #38bdf8;
}

.day {
  background: #334155;
  padding: 12px;
  border-radius: 12px;
  margin-top: 8px;
  cursor: pointer;
}

.day.selected {
  background: #22c55e;
}

#loader {
  text-align: center;
  padding: 20px;
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>

<body dir="rtl">

<div class="container">

  <h1>🎾 פיקלבול</h1>

  <!-- LOADER -->
  <div id="loader">בודק משתמש...</div>

  <!-- AUTH -->
  <div id="authBox" class="card" style="display:none;">
    <input id="email" placeholder="אימייל להתחברות">
    <button class="login" onclick="login()">🔐 התחבר</button>
    <div id="errorBox"></div>
  </div>

  <!-- APP -->
  <div id="appBox" style="display:none;">

    <div class="card">
      <input id="name" placeholder="שם מלא">
      <button class="primary" onclick="submitForm()">הרשמה</button>
    </div>

    <div class="card">
      <h3>ימים</h3>
      <div id="days"></div>
    </div>

  </div>

  <div id="userBox"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://svasvbooeixwbfgyteml.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2YXN2Ym9vZWl4d2JmZ3l0ZW1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODE3MDAsImV4cCI6MjA5MTQ1NzcwMH0.SseXrAMUs8hgIxT0jOccH8svqaPR7lgOAWNcYvDvdo0";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let selected = [];

// =========================
// 🔐 LOGIN (whitelist)
// =========================
async function login() {
  const email = document.getElementById("email").value.trim().toLowerCase();
  const errorBox = document.getElementById("errorBox");
  errorBox.innerText = "";

  if (!email) {
    errorBox.innerText = "נא להזין אימייל";
    return;
  }

  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/check-user`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
      },
      body: JSON.stringify({ email }),
    });

    const data = await res.json();

    if (!res.ok || !data.allowed) {
      errorBox.innerText = "האימייל לא מורשה ❌";
      return;
    }

    const { error } = await client.auth.signInWithOtp({
      email,
      options: {
        emailRedirectTo: window.location.href,
      },
    });

    if (error) {
      errorBox.innerText = "שגיאה בשליחת מייל";
      return;
    }

    alert("נשלח מייל 📧");

  } catch (err) {
    errorBox.innerText = "שגיאה בחיבור לשרת";
  }
}

// =========================
// 📅 DAYS
// =========================
function buildDays() {
  const container = document.getElementById("days");

  for (let i = 1; i <= 7; i++) {
    let d = new Date();
    d.setDate(d.getDate() + i);

    let iso = d.toISOString().split("T")[0];

    let div = document.createElement("div");
    div.className = "day";

    div.innerText = `יום ${i} - ${iso}`;

    div.onclick = () => {
      div.classList.toggle("selected");

      if (selected.includes(iso)) {
        selected = selected.filter(x => x !== iso);
      } else {
        selected.push(iso);
      }
    };

    container.appendChild(div);
  }
}

// =========================
// 📝 SUBMIT
// =========================
async function submitForm() {
  const { data: { user } } = await client.auth.getUser();
  const name = document.getElementById("name").value.trim();

  if (!user) return alert("צריך להתחבר");
  if (!name || selected.length === 0) return alert("מלא הכל");

  alert("נרשם בהצלחה 🎾");
}

// =========================
// 🔄 AUTH STATE + LOADER
// =========================
async function updateAuthUI() {
  const loader = document.getElementById("loader");
  const authBox = document.getElementById("authBox");
  const appBox = document.getElementById("appBox");
  const userBox = document.getElementById("userBox");

  loader.style.display = "block";

  const { data: { user } } = await client.auth.getUser();

  loader.style.display = "none";

  if (user) {
    authBox.style.display = "none";
    appBox.style.display = "block";

    userBox.innerHTML = `<p>מחובר כ: <b>${user.email}</b></p>`;
  } else {
    authBox.style.display = "block";
    appBox.style.display = "none";
    userBox.innerHTML = "";
  }
}

buildDays();
updateAuthUI();

client.auth.onAuthStateChange(() => updateAuthUI());
</script>

</body>
</html>
