<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פיקלבול בת חפר 🎾</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

.container { max-width: 500px; margin: auto; padding: 20px; }
h1 { text-align: center; }

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

.day {
  background: #1e293b;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
}

.slot-btn {
  margin: 5px;
  padding: 8px 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #334155;
  color: white;
}

.slot-btn.selected {
  background: #22c55e;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.primary { background: #38bdf8; }
.login { background: #6366f1; color: white; }
.delete-btn {
  background: #ef4444;
  color: white;
  border: none;
  padding: 4px 8px;
  border-radius: 6px;
}
</style>
</head>

<body dir="rtl">

<div class="container">

<h1>🎾 פיקלבול בת חפר</h1>

<input id="email" placeholder="אימייל להתחברות">
<button class="login" onclick="login()">🔐 התחבר</button>

<hr>

<div id="userBox"></div>

<input id="name" placeholder="שם מלא">

<div id="days"></div>

<button class="primary" onclick="submitForm()">הרשמה</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://svasvbooeixwbfgyteml.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2YXN2Ym9vZWl4d2JmZ3l0ZW1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODE3MDAsImV4cCI6MjA5MTQ1NzcwMH0.SseXrAMUs8hgIxT0jOccH8svqaPR7lgOAWNcYvDvdo0";

const CREATE_URL = `${SUPABASE_URL}/functions/v1/create-registration`;
const GET_URL = `${SUPABASE_URL}/functions/v1/get-registrations`;
const DELETE_URL = `${SUPABASE_URL}/functions/v1/delete-registration`;

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let selected = [];

const TIMES = ["08:00", "10:00", "18:00"];

// =========================
// AUTH
// =========================
async function login() {
  const email = document.getElementById("email").value.trim();

  if (!email) return alert("הכנס אימייל");

  const { error } = await client.auth.signInWithOtp({
    email,
    options: {
      emailRedirectTo: "https://natandlankri.github.io/pickelball-app/"
    }
  });

  if (error) return alert("שגיאה");
  alert("נשלח מייל 📧");
}

async function updateAuthUI() {
  const { data: { user } } = await client.auth.getUser();

  if (user) {
    document.getElementById("email").style.display = "none";
    document.querySelector(".login").style.display = "none";

    document.getElementById("userBox").innerHTML = `
      <p>מחובר: <b>${user.email}</b></p>
      <button onclick="logout()">יציאה</button>
    `;
  }
}

async function logout() {
  await client.auth.signOut();
  location.reload();
}

// =========================
// DAYS + SLOTS
// =========================
function buildDays() {
  const container = document.getElementById("days");

  for (let i = 1; i <= 7; i++) {
    let d = new Date();
    d.setDate(d.getDate() + i);

    let date = new Date(d.getTime() - d.getTimezoneOffset() * 60000)
      .toISOString().split("T")[0];

    let div = document.createElement("div");
    div.className = "day";

    let slots = TIMES.map(t => `
      <button class="slot-btn" onclick="toggleSlot('${date}','${t}', this)">
        ${t}
      </button>
    `).join("");

    div.innerHTML = `
      <b>${date}</b>
      <div>${slots}</div>
    `;

    container.appendChild(div);
  }
}

function toggleSlot(date, time, el) {
  const key = `${date}|${time}`;

  if (selected.includes(key)) {
    selected = selected.filter(x => x !== key);
    el.classList.remove("selected");
  } else {
    selected.push(key);
    el.classList.add("selected");
  }
}

// =========================
// SUBMIT
// =========================
async function submitForm() {
  const name = document.getElementById("name").value.trim();
  const { data: { session } } = await client.auth.getSession();

  if (!session) return alert("יש להתחבר");
  if (!name || selected.length === 0) return alert("מלא הכל");

  const res = await fetch(CREATE_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`
    },
    body: JSON.stringify({
      name,
      slots: selected
    })
  });

  const data = await res.json().catch(() => ({}));

  if (!res.ok) {
    console.error(data);
    return alert(data.error || "שגיאה");
  }

  selected = [];
  document.querySelectorAll(".slot-btn.selected")
    .forEach(b => b.classList.remove("selected"));

  alert("נרשמת בהצלחה 🎾");
}

// =========================
// INIT
// =========================
buildDays();
updateAuthUI();
client.auth.onAuthStateChange(() => updateAuthUI());
</script>

</body>
</html>
