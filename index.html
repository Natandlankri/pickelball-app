<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פיקלבול 🎾</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.login { background: #6366f1; color: white; }
.primary { background: #38bdf8; }

.slot {
  background: #475569;
  padding: 8px;
  margin-top: 6px;
  border-radius: 8px;
}

.slot.selected {
  background: #22c55e;
}

#loader {
  display: none;
  font-size: 12px;
  opacity: 0.7;
  margin-top: 5px;
}

#userBox {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.9;
}
</style>
</head>

<body dir="rtl">

<div class="container">

  <h1>🎾 פיקלבול</h1>

  <!-- AUTH -->
  <div class="card" id="authBox">
    <input id="email" placeholder="אימייל להתחברות">
    <button class="login" onclick="login()">🔐 התחבר</button>
    <div id="loader">בודק הרשאה...</div>
    <div id="errorBox" style="color:#ef4444;margin-top:8px;"></div>
  </div>

  <!-- APP -->
  <div id="appBox" style="display:none;">
    <div class="card">
      <input id="name" placeholder="שם מלא">
      <button class="primary" onclick="submitForm()">הרשמה</button>
    </div>

    <div id="days"></div>
  </div>

  <div id="userBox"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://svasvbooeixwbfgyteml.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2YXN2Ym9vZWl4d2JmZ3l0ZW1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODE3MDAsImV4cCI6MjA5MTQ1NzcwMH0.SseXrAMUs8hgIxT0jOccH8svqaPR7lgOAWNcYvDvdo0";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true,
  },
});

let selected = [];

// =========================
// 📦 FETCH REGISTRATIONS
// =========================
async function fetchRegistrations() {
const { data: { session } } = await client.auth.getSession();

if (!session?.access_token) return;

  const res = await fetch(`${SUPABASE_URL}/functions/v1/get-registrations`, {
    method: "GET",
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`,
    },
  });

  const data = await res.json();

  if (res.ok) {
    renderRegistrations(data);
  }
}

// =========================
// 🎾 RENDER UI
// =========================
function renderRegistrations(data) {
  const container = document.getElementById("days");
  container.innerHTML = "";

  const times = ["07:30", "17:00"];

  const grouped = {};
  data.forEach(r => {
    if (!grouped[r.date]) grouped[r.date] = [];
    grouped[r.date].push(r);
  });

  for (let i = 1; i <= 7; i++) {
    let d = new Date();
    d.setDate(d.getDate() + i);
    let date = d.toISOString().split("T")[0];

    const card = document.createElement("div");
    card.className = "card";

    let html = `<b>${date}</b><br><br>`;

    times.forEach(time => {
      const booked = (grouped[date] || []).find(x => x.time === time);

      html += `
        <div class="slot ${booked ? "selected" : ""}">
          ${time} ${booked ? " - " + booked.name : ""}
        </div>
      `;
    });

    card.innerHTML = html;
    container.appendChild(card);
  }
}

// =========================
// 🔐 LOGIN
// =========================
async function login() {
  const email = document.getElementById("email").value.trim().toLowerCase();
  const loader = document.getElementById("loader");
  const errorBox = document.getElementById("errorBox");

  loader.style.display = "block";
  errorBox.innerText = "";

  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/check-user`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
      },
      body: JSON.stringify({ email }),
    });

    const data = await res.json();

    if (!res.ok || !data.allowed) {
      throw new Error("האימייל לא מורשה");
    }

    const { error } = await client.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.href },
    });

    if (error) throw error;

    alert("נשלח מייל 📧");

  } catch (err) {
    errorBox.innerText = err.message;
  }

  loader.style.display = "none";
}

// =========================
// 📝 SUBMIT
// =========================
async function submitForm() {
  const name = document.getElementById("name").value.trim();
  const { data: { session } } = await client.auth.getSession();

  if (!session) return alert("צריך להתחבר");
  if (!name || selected.length === 0) return alert("בחר שם ושעות");

  const res = await fetch(`${SUPABASE_URL}/functions/v1/create-registration`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`,
    },
    body: JSON.stringify({ name, slots: selected }),
  });

  const data = await res.json();

  if (!res.ok) {
    return alert(data.error);
  }

  alert("נרשמת בהצלחה 🎾");
  selected = [];

  fetchRegistrations();
}

// =========================
// 🔄 SESSION
// =========================
async function checkSession() {
const { data: { session } } = await client.auth.getSession();
const user = session?.user;

  const authBox = document.getElementById("authBox");
  const appBox = document.getElementById("appBox");
  const userBox = document.getElementById("userBox");

  if (user) {
    authBox.style.display = "none";
    appBox.style.display = "block";
    userBox.innerHTML = `<p>מחובר כ: <b>${user.email}</b></p>`;

    fetchRegistrations();
  } else {
    authBox.style.display = "block";
    appBox.style.display = "none";
    userBox.innerHTML = "";
  }
}

// =========================
// INIT
// =========================
window.addEventListener("load", async () => {
  // 🔥 wait for Supabase to restore session properly
  const { data, error } = await client.auth.getSession();

  if (data.session) {
    console.log("SESSION RESTORED", data.session);
  } else {
    console.log("NO SESSION FOUND");
  }

  // build UI only after session is checked
  checkSession();
});

// 🔥 keep auth listener for login/logout changes
client.auth.onAuthStateChange((_event, session) => {
  checkSession();
});
</script>

</body>
</html>
