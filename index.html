<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פיקלבול 🎾</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

.container { max-width: 500px; margin: auto; padding: 20px; }
h1 { text-align: center; }

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

.days {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.day {
  background: #334155;
  padding: 12px;
  border-radius: 12px;
}

.count { font-size: 12px; opacity: 0.8; }
.players { font-size: 12px; margin-top: 5px; }

.hours {
  display: flex;
  gap: 5px;
  margin-top: 8px;
  flex-wrap: wrap;
}

.hour {
  background: #475569;
  padding: 6px 8px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
}

.hour.selected {
  background: #22c55e;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.primary { background: #38bdf8; }
.login { background: #6366f1; color: white; }

.delete-btn {
  background: #ef4444;
  color: white;
  border: none;
  padding: 4px 8px;
  border-radius: 6px;
}
</style>
</head>

<body dir="rtl">

<div class="container">
<h1>🎾 פיקלבול</h1>

<div class="card">

<input id="email" placeholder="אימייל להתחברות">
<button class="login" onclick="login()">🔐 התחבר</button>

<hr id="authLine">

<div id="userBox"></div>

<input id="name" placeholder="שם מלא">

<div class="days" id="days"></div>

<button class="primary" onclick="submitForm()">הרשמה</button>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://svasvbooeixwbfgyteml.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2YXN2Ym9vZWl4d2JmZ3l0ZW1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODE3MDAsImV4cCI6MjA5MTQ1NzcwMH0.SseXrAMUs8hgIxT0jOccH8svqaPR7lgOAWNcYvDvdo0";

const GET_URL = `${SUPABASE_URL}/functions/v1/get-registrations`;
const CREATE_URL = `${SUPABASE_URL}/functions/v1/create-registration`;
const DELETE_URL = `${SUPABASE_URL}/functions/v1/delete-registration`;

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const HOURS = ["18:00","19:00","20:00"];

let selected = [];
let dayMap = {};

// =========================
// AUTH
// =========================
async function login() {
  const email = document.getElementById("email").value.trim();
  if (!email) return alert("הכנס אימייל");

  await client.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: location.href }
  });

  alert("נשלח מייל 📧");
}

async function logout() {
  await client.auth.signOut();
  updateAuthUI();
}

// =========================
// UI AUTH CONTROL
// =========================
async function updateAuthUI() {
  const { data: { user } } = await client.auth.getUser();

  const emailInput = document.getElementById("email");
  const loginBtn = document.querySelector(".login");

  const nameInput = document.getElementById("name");
  const submitBtn = document.querySelector(".primary");
  const authLine = document.getElementById("authLine");

  if (user) {
    emailInput.style.display = "none";
    loginBtn.style.display = "none";

    nameInput.style.display = "block";
    submitBtn.style.display = "block";
    authLine.style.display = "block";

    document.getElementById("userBox").innerHTML = `
      <p>מחובר כ: <b>${user.email}</b></p>
      <button onclick="logout()">יציאה</button>
    `;
  } else {
    emailInput.style.display = "block";
    loginBtn.style.display = "block";

    nameInput.style.display = "none";
    submitBtn.style.display = "none";
    authLine.style.display = "none";

    document.getElementById("userBox").innerHTML = "";
  }
}

// =========================
// DAYS + HOURS
// =========================
function buildDays() {
  const container = document.getElementById("days");

  for (let i = 1; i <= 7; i++) {
    let d = new Date();
    d.setDate(d.getDate() + i);

    let iso = new Date(d.getTime() - d.getTimezoneOffset() * 60000)
      .toISOString().split("T")[0];

    let label = d.toLocaleDateString("he-IL", {
      weekday: "short",
      day: "2-digit",
      month: "2-digit"
    });

    let div = document.createElement("div");
    div.className = "day";

    div.innerHTML = `
      <div>${label}</div>
      <div class="count">טוען...</div>
      <div class="players"></div>
      <div class="hours">
        ${HOURS.map(h => `<div class="hour" data-hour="${h}">${h}</div>`).join("")}
      </div>
    `;

    div.querySelectorAll(".hour").forEach(hourEl => {
      hourEl.onclick = (e) => {
        e.stopPropagation();

        const key = `${iso}|${hourEl.dataset.hour}`;

        hourEl.classList.toggle("selected");

        if (selected.includes(key)) {
          selected = selected.filter(x => x !== key);
        } else {
          selected.push(key);
        }
      };
    });

    dayMap[iso] = div;
    container.appendChild(div);
  }
}

// =========================
// LOAD
// =========================
async function load() {
  const { data: { session } } = await client.auth.getSession();
  if (!session) return;

  const res = await fetch(GET_URL, {
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`
    }
  });

  const data = await res.json();
  const grouped = {};

  (data || []).forEach(r => {
    const key = `${r.date}|${r.time}`;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(r);
  });

  for (let date in dayMap) {
    const el = dayMap[date];

    let total = 0;

    el.querySelectorAll(".hour").forEach(hourEl => {
      const hour = hourEl.dataset.hour;
      const key = `${date}|${hour}`;
      const list = grouped[key] || [];

      total += list.length;

      hourEl.innerText = `${hour} (${list.length})`;
    });

    el.querySelector(".count").innerText = `${total} שחקנים`;

    el.querySelector(".players").innerHTML = Object.entries(grouped)
      .filter(([k]) => k.startsWith(date))
      .flatMap(([k, players]) =>
        players.map(p => `
          <div style="display:flex;justify-content:space-between;">
            <span>${p.name} (${p.time})</span>
            <button class="delete-btn" onclick="deleteRow('${p.id}')">❌</button>
          </div>
        `)
      ).join("");
  }
}

// =========================
// SUBMIT
// =========================
async function submitForm() {
  const name = document.getElementById("name").value.trim();
  const { data: { session } } = await client.auth.getSession();

  if (!session) return alert("יש להתחבר קודם");
  if (!name || selected.length === 0) return alert("מלא הכל");

  await fetch(CREATE_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`
    },
    body: JSON.stringify({
      name,
      slots: selected
    })
  });

  selected = [];
  document.querySelectorAll(".hour.selected")
    .forEach(h => h.classList.remove("selected"));

  await load();
}

// =========================
// DELETE
// =========================
async function deleteRow(id) {
  const { data: { session } } = await client.auth.getSession();

  if (!session) return alert("צריך להתחבר");

  if (!confirm("למחוק את ההרשמה?")) return;

  const res = await fetch(DELETE_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`
    },
    body: JSON.stringify({ id })
  });

  const result = await res.json();

  if (!res.ok) return alert(result.error);

  await load();
}

// =========================
// INIT
// =========================
buildDays();
updateAuthUI();
client.auth.onAuthStateChange(() => {
  updateAuthUI();
  load();
});
</script>

</body>
</html>
