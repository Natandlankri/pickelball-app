// =========================

function toggleSlot(date, time, el) {
  const key = `${date}|${time}`;
  const i = selected.indexOf(key);

  if (i > -1) {
    selected.splice(i, 1);
    el.classList.remove("selected");
  } else {
    selected.push(key);
    el.classList.add("selected");
    card.innerHTML = html;
    container.appendChild(card);
  }
}
