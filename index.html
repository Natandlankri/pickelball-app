<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פיקלבול בת חפר 🎾</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

button {
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.login { background: #6366f1; color: white; }
.primary { background: #38bdf8; }

.slot {
  background: #475569;
  padding: 10px;
  margin-top: 6px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.slot.selected {
  background: #22c55e;
}

.delete-btn {
  background: #ef4444;
  border: none;
  color: white;
  border-radius: 6px;
  padding: 4px 8px;
  cursor: pointer;
}
</style>
</head>

<body dir="rtl">

<div class="container">

  <h1>🎾 פיקלבול בת חפר</h1>

  <!-- AUTH -->
  <div class="card" id="authBox">
    <input id="email" placeholder="אימייל להתחברות">
    <button class="login" onclick="login()">🔐 התחבר</button>
  </div>

  <!-- APP -->
  <div id="appBox" style="display:none;">
    <div class="card">
      <input id="name" placeholder="שם מלא">
      <button class="primary" onclick="submitForm()">הרשמה</button>
    </div>

    <div id="days"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://svasvbooeixwbfgyteml.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2YXN2Ym9vZWl4d2JmZ3l0ZW1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODE3MDAsImV4cCI6MjA5MTQ1NzcwMH0.SseXrAMUs8hgIxT0jOccH8svqaPR7lgOAWNcYvDvdo0";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true
  }
});

let selected = [];
let holidaysMap = {};
let lastLoginAttempt = 0;

// =========================
// 🇮🇱 HOLIDAYS
// =========================
async function loadHolidays() {
  try {
    const year = new Date().getFullYear();

    const res = await fetch(
      `https://www.hebcal.com/hebcal?v=1&cfg=json&year=${year}&lg=he&maj=on&min=on&mod=on&nx=on`
    );

    const data = await res.json();
    const map = {};

    data.items.forEach(item => {
      if (!item.date || !item.title) return;
      const date = new Date(item.date).toISOString().split("T")[0];
      map[date] = item.title;
    });

    holidaysMap = map;

  } catch (err) {
    console.error(err);
  }
}

// =========================
// INIT (magic link fix)
// =========================
window.addEventListener("load", async () => {

  const { data } = await client.auth.getSession();

  if (window.location.hash.includes("access_token")) {
    if (data.session) window.location.hash = "";
  }

  await loadHolidays();

  if (data.session) {
    showApp();
    fetchRegistrations();
  }
});

// =========================
// AUTH LISTENER
// =========================
client.auth.onAuthStateChange((_event, session) => {
  if (session) {
    showApp();
    fetchRegistrations();
  }
});

// =========================
// SHOW APP
// =========================
function showApp() {
  document.getElementById("authBox").style.display = "none";
  document.getElementById("appBox").style.display = "block";
}

// =========================
// LOGIN (FIXED)
// =========================
async function login() {
  const emailInput = document.getElementById("email");
  const btn = document.querySelector(".login");

  const email = emailInput.value.trim().toLowerCase();

  if (!email) return alert("נא להזין אימייל");

  const now = Date.now();
  if (now - lastLoginAttempt < 60000) {
    return alert("חכה דקה לפני שליחה נוספת 🙏");
  }

  lastLoginAttempt = now;

  try {
    btn.disabled = true;
    btn.innerText = "שולח...";

    const { error } = await client.auth.signInWithOtp({
      email,
      options: {
        emailRedirectTo: window.location.origin
      }
    });

    if (error) {
      if (error.message?.includes("rate") || error.status === 429) {
        return alert("שלחת יותר מדי בקשות 😅");
      }
      return alert(error.message);
    }

    showCheckEmailState(email);

  } catch (err) {
    alert("שגיאה כללית");
  } finally {
    btn.disabled = false;
    btn.innerText = "🔐 התחבר";
  }
}

// =========================
// EMAIL SENT UI
// =========================
function showCheckEmailState(email) {
  document.getElementById("authBox").innerHTML = `
    <div style="text-align:center;">
      <h3>📧 נשלח קישור</h3>
      <p>בדוק את המייל:</p>
      <b>${email}</b>
    </div>
  `;
}

// =========================
// TOGGLE SLOT
// =========================
function toggleSlot(date, time, el) {
  const key = `${date}|${time}`;
  const i = selected.indexOf(key);

  if (i > -1) {
    selected.splice(i, 1);
    el.classList.remove("selected");
  } else {
    selected.push(key);
    el.classList.add("selected");
  }
}

// =========================
// FETCH
// =========================
async function fetchRegistrations() {
  const { data: { session } } = await client.auth.getSession();
  if (!session) return;

  const res = await fetch(`${SUPABASE_URL}/functions/v1/get-registrations`, {
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`
    }
  });

  const data = await res.json();
  render(data);
}

// =========================
// DELETE
// =========================
async function deleteRegistration(id) {
  const { data: { session } } = await client.auth.getSession();

  await fetch(`${SUPABASE_URL}/functions/v1/delete-registration`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`
    },
    body: JSON.stringify({ id })
  });

  alert("נמחק ❌");
  fetchRegistrations();
}

// =========================
// SUBMIT
// =========================
async function submitForm() {
  const name = document.getElementById("name").value;
  const { data: { session } } = await client.auth.getSession();

  if (!name || selected.length === 0) {
    return alert("בחר שם ושעות");
  }

  const res = await fetch(`${SUPABASE_URL}/functions/v1/create-registration`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`
    },
    body: JSON.stringify({ name, slots: selected })
  });

  const data = await res.json();

  if (!res.ok) return alert(data.error);

  alert("נרשמת 🎾");
  selected = [];
  fetchRegistrations();
}

// =========================
// RENDER
// =========================
function render(data) {
  const container = document.getElementById("days");
  container.innerHTML = "";

  const times = ["07:30", "17:00"];

  const grouped = {};
  data.forEach(r => {
    if (!grouped[r.date]) grouped[r.date] = [];
    grouped[r.date].push(r);
  });

  for (let i = 1; i <= 7; i++) {
    let d = new Date();
    d.setDate(d.getDate() + i);

    const date = d.toISOString().split("T")[0];
    const holiday = holidaysMap[date];

    const card = document.createElement("div");
    card.className = "card";

    let html = `<b>${date}</b>`;

    if (holiday) {
      html += `<div style="color:#fbbf24;">📅 ${holiday}</div>`;
    }

    html += `<br><br>`;

    times.forEach(time => {
      const booked = (grouped[date] || []).find(x => x.time === time);

      if (booked) {
        html += `
          <div class="slot">
            <span>${time} - ${booked.name}</span>
            <button class="delete-btn" onclick="deleteRegistration('${booked.id}')">🗑️</button>
          </div>
        `;
      } else {
        html += `
          <div class="slot" onclick="toggleSlot('${date}','${time}',this)">
            ${time}
          </div>
        `;
      }
    });

    card.innerHTML = html;
    container.appendChild(card);
  }
}
</script>

</body>
</html>
