<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פיקלבול 🎾</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

.container { max-width: 500px; margin: auto; padding: 20px; }
h1 { text-align: center; }

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

.days {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.day {
  background: #334155;
  padding: 12px;
  border-radius: 12px;
  cursor: pointer;
}

.day.selected { background: #22c55e; }

.count { font-size: 12px; opacity: 0.8; }
.players { font-size: 12px; margin-top: 5px; }

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.primary { background: #38bdf8; }
.login { background: #6366f1; color: white; }

.delete-btn {
  background: #ef4444;
  color: white;
  border: none;
  padding: 4px 8px;
  border-radius: 6px;
}
</style>
</head>

<body dir="rtl">

<div class="container">
<h1>🎾פיקלבול בת חפר</h1>

<!-- AUTH -->
<div id="authBox">
  <input id="email" placeholder="אימייל להתחברות">
  <button class="login" onclick="login()">🔐 התחבר</button>
</div>

<!-- APP -->
<div id="appBox" style="display:none;">
  <div class="card">

    <div id="userBox"></div>

    <input id="name" placeholder="שם מלא">

    <div class="days" id="days"></div>

    <button class="primary" onclick="submitForm()">הרשמה</button>

  </div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://svasvbooeixwbfgyteml.supabase.co";
const SUPABASE_ANON_KEY = "YOUR_ANON_KEY";

const GET_URL = `${SUPABASE_URL}/functions/v1/get-registrations`;
const CREATE_URL = `${SUPABASE_URL}/functions/v1/create-registration`;
const DELETE_URL = `${SUPABASE_URL}/functions/v1/delete-registration`;

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let selected = [];
let dayMap = {};

// =========================
// LOGIN
// =========================
async function login() {
  const email = document.getElementById("email").value.trim();

  if (!email) return alert("הכנס אימייל");

  const { error } = await client.auth.signInWithOtp({
    email,
    options: {
      emailRedirectTo: "https://natandlankri.github.io/pickelball-app/"
    }
  });

  if (error) {
    console.error(error);
    return alert("שגיאה בשליחת מייל");
  }

  alert("נשלח מייל 📧");
}

// =========================
// AUTH UI
// =========================
async function updateAuthUI() {
  const { data: { user } } = await client.auth.getUser();

  const authBox = document.getElementById("authBox");
  const appBox = document.getElementById("appBox");

  if (user) {
    authBox.style.display = "none";
    appBox.style.display = "block";

    document.getElementById("userBox").innerHTML = `
      <p>מחובר כ: <b>${user.email}</b></p>
      <button onclick="logout()">יציאה</button>
    `;
  } else {
    authBox.style.display = "block";
    appBox.style.display = "none";
  }
}

// =========================
// LOGOUT
// =========================
window.logout = async function () {
  await client.auth.signOut();
  await updateAuthUI();
};

// =========================
// DAYS
// =========================
function buildDays() {
  const container = document.getElementById("days");

  for (let i = 1; i <= 7; i++) {
    let d = new Date();
    d.setDate(d.getDate() + i);

    let iso = new Date(d.getTime() - d.getTimezoneOffset() * 60000)
      .toISOString().split("T")[0];

    let label = d.toLocaleDateString("he-IL", {
      weekday: "short",
      day: "2-digit",
      month: "2-digit"
    });

    let div = document.createElement("div");
    div.className = "day";

    div.innerHTML = `
      <div>${label}</div>
      <div class="count">טוען...</div>
      <div class="players"></div>
    `;

    div.onclick = () => {
      div.classList.toggle("selected");

      if (selected.includes(iso)) {
        selected = selected.filter(x => x !== iso);
      } else {
        selected.push(iso);
      }
    };

    dayMap[iso] = div;
    container.appendChild(div);
  }
}

// =========================
// LOAD
// =========================
async function load() {
  const res = await fetch(GET_URL, {
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`
    }
  });

  const data = await res.json();
  const grouped = {};

  (data || []).forEach(r => {
    if (!grouped[r.date]) grouped[r.date] = [];
    grouped[r.date].push(r);
  });

  for (let date in dayMap) {
    const el = dayMap[date];
    const list = grouped[date] || [];

    el.querySelector(".count").innerText = `${list.length} שחקנים`;

    el.querySelector(".players").innerHTML = list.map(p => `
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span>${p.name}</span>
        <button class="delete-btn" onclick="deleteRow('${p.id}')">❌</button>
      </div>
    `).join("");
  }
}

// =========================
// SUBMIT
// =========================
async function submitForm() {
  const name = document.getElementById("name").value.trim();

  const { data: { user } } = await client.auth.getUser();

  if (!user) return alert("צריך להתחבר");
  if (!name || selected.length === 0) return alert("מלא הכל");

  await fetch(CREATE_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`
    },
    body: JSON.stringify({
      name,
      email: user.email,
      dates: selected,
      user_id: user.id
    })
  });

  selected = [];
  document.querySelectorAll(".day.selected")
    .forEach(d => d.classList.remove("selected"));

  await load();
}

// =========================
// DELETE (🔥 FIXED JWT)
// =========================
async function deleteRow(id) {
  const { data: { session } } = await client.auth.getSession();

  if (!session) {
    alert("צריך להתחבר");
    return;
  }

  const res = await fetch(DELETE_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}` // ✅ FIX כאן
    },
    body: JSON.stringify({ id })
  });

  const result = await res.json();

  if (!res.ok) {
    console.error(result);
    alert(result.error || "שגיאה במחיקה");
    return;
  }

  await load();
}

// =========================
// INIT
// =========================
buildDays();
load();
updateAuthUI();
client.auth.onAuthStateChange(() => updateAuthUI());
</script>

</body>
</html>
