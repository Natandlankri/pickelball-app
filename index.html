<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פיקלבול בת חפר 🎾</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
  padding-bottom: 90px;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  box-sizing: border-box;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.login { background: #6366f1; color: white; }

.slot {
  background: #475569;
  padding: 10px;
  margin-top: 6px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s;
}

.slot.selected {
  background: #22c55e;
}

/* Slot header row: time + count badge on left */
.slot-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.slot-meta {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Player count badge */
.count-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  font-weight: bold;
  background: rgba(0,0,0,0.25);
  border-radius: 20px;
  padding: 2px 10px;
  color: #cbd5e1;
}

/* "יש משחק" badge – shown when 4+ registered */
.game-on-badge {
  font-size: 12px;
  font-weight: bold;
  background: #fbbf24;
  color: #1e293b;
  border-radius: 20px;
  padding: 2px 10px;
  white-space: nowrap;
}

/* Day header above each card */
.day-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 20px 0 6px 0;
  padding: 0 4px;
}

.day-header-title {
  font-size: 15px;
  font-weight: bold;
  color: #e2e8f0;
}

.day-header-date {
  font-size: 12px;
  color: #64748b;
  margin-top: 2px;
}

.day-header-badge {
  font-size: 12px;
  font-weight: bold;
  background: #fbbf24;
  color: #1e293b;
  border-radius: 20px;
  padding: 3px 12px;
}

.day-header-first {
  margin-top: 4px;
}

/* Weather strip under day header */
.weather-strip {
  display: flex;
  gap: 6px;
  align-items: stretch;
  font-size: 12px;
  color: #94a3b8;
  padding: 8px 4px 10px 4px;
  margin-top: 0;
  margin-bottom: 4px;
}

.weather-pill {
  display: flex;
  flex-direction: column;
  gap: 4px;
  background: #1e293b;
  border-radius: 10px;
  padding: 8px 12px;
  flex: 1;
}

.weather-pill .w-label {
  font-size: 11px;
  color: #64748b;
}

.weather-pill .w-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.weather-pill .w-temp {
  color: #e2e8f0;
  font-weight: bold;
  font-size: 14px;
}

.weather-pill .w-wind-val {
  display: flex;
  align-items: center;
  gap: 3px;
  font-size: 12px;
  color: #94a3b8;
}

.weather-pill .w-wind-val.strong {
  color: #fbbf24;
  font-weight: bold;
}

.weather-strip .w-icon {
  font-size: 14px;
}

.booking-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
}

.trash-btn {
  background: transparent;
  border: none;
  color: #ef4444;
  cursor: pointer;
  font-size: 16px;
}

/* Sticky bottom button */
.sticky-footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 16px 20px;
  background: #0f172a;
  border-top: 1px solid #1e293b;
  display: flex;
  justify-content: center;
  z-index: 100;
}

.register-btn {
  max-width: 500px;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: background 0.2s, opacity 0.2s;
  background: #38bdf8;
  color: #0f172a;
}

.register-btn:disabled {
  background: #334155;
  color: #64748b;
  cursor: not-allowed;
}

/* Summary table */
.summary-card {
  background: #1e293b;
  padding: 16px;
  border-radius: 16px;
  margin-bottom: 20px;
  overflow-x: auto;
}

.summary-card h3 {
  margin: 0 0 12px 0;
  font-size: 14px;
  color: #94a3b8;
  font-weight: normal;
}

.summary-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  text-align: center;
}

.summary-table th {
  color: #94a3b8;
  font-weight: normal;
  padding: 4px 6px;
  font-size: 12px;
}

.summary-table th.time-col {
  text-align: right;
  color: #cbd5e1;
  font-weight: bold;
}

.summary-table td {
  padding: 6px 4px;
  border-radius: 6px;
}

.summary-table td.time-label {
  text-align: right;
  color: #94a3b8;
  font-size: 12px;
  padding-left: 0;
  white-space: nowrap;
}

.cell-empty {
  color: #475569;
}

.cell-few {
  color: #cbd5e1;
  font-weight: bold;
}

.cell-game {
  background: #fbbf24;
  color: #1e293b;
  font-weight: bold;
  border-radius: 6px;
  position: relative;
}

.cell-game::after {
  content: "🏓";
  font-size: 10px;
  display: block;
  line-height: 1;
}
</style>
</head>

<body dir="rtl">

<div class="container">

  <h1>🎾 פיקלבול בת חפר</h1>

  <!-- AUTH -->
  <div class="card" id="authBox">
    <input id="email" placeholder="אימייל להתחברות">
    <button class="login" onclick="login()">🔐 התחבר</button>
  </div>

  <!-- APP -->
  <div id="appBox" style="display:none;">
    <div class="summary-card" id="summaryCard" style="display:none;">
      <h3>📊 סיכום הרשמות</h3>
      <div id="summaryTable"></div>
    </div>
    <div id="days"></div>
  </div>

</div>

<!-- Sticky register button -->
<div class="sticky-footer" id="stickyFooter" style="display:none;">
  <button class="register-btn" id="registerBtn" onclick="submitForm()" disabled>
    בחר שעות להרשמה
  </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://svasvbooeixwbfgyteml.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2YXN2Ym9vZWl4d2JmZ3l0ZW1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODE3MDAsImV4cCI6MjA5MTQ1NzcwMH0.SseXrAMUs8hgIxT0jOccH8svqaPR7lgOAWNcYvDvdo0";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let selected = [];
let holidaysMap = {};
let weatherMap = {}; // keyed by date → {tempMorning, tempEvening, windMorning, windEvening}
let currentUserId = null;

// ================= DATE =================
function formatDateLocal(d) {
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${year}-${month}-${day}`;
}

// ================= HOLIDAYS =================
async function loadHolidays(year = 2026) {
  const res = await fetch(
    `https://www.hebcal.com/hebcal?v=1&cfg=json&year=${year}&lg=he&maj=on&min=off&mod=on&nx=off&mf=on&i=on`
  );
  const data = await res.json();
  holidaysMap = {};
  (data.items || []).forEach(item => {
    if (item.category === "holiday") {
      const dateKey = item.date.substring(0, 10);
      holidaysMap[dateKey] = item.hebrew || item.title;
    }
  });
}

// ================= WEATHER =================
async function loadWeather() {
  // Beit Hefer coordinates
  const lat = 32.37;
  const lon = 34.92;
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,windspeed_10m&forecast_days=8&timezone=Asia%2FJerusalem`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    const times = data.hourly.time;      // "2026-04-20T07:00"
    const temps = data.hourly.temperature_2m;
    const winds = data.hourly.windspeed_10m;

    weatherMap = {};
    times.forEach((t, i) => {
      const date = t.slice(0, 10);
      const hour = parseInt(t.slice(11, 13));
      if (!weatherMap[date]) weatherMap[date] = {};
      // capture closest hours to our slots
      if (hour === 7)  { weatherMap[date].tempMorning = Math.round(temps[i]); weatherMap[date].windMorning = Math.round(winds[i]); }
      if (hour === 17) { weatherMap[date].tempEvening = Math.round(temps[i]); weatherMap[date].windEvening = Math.round(winds[i]); }
    });
  } catch(e) {
    console.warn("Weather load failed", e);
  }
}

function weatherIcon(temp) {
  if (temp >= 32) return "🌡️";
  if (temp >= 25) return "☀️";
  if (temp >= 18) return "⛅";
  return "🌥️";
}

// ================= UPDATE BUTTON =================
function updateRegisterBtn() {
  const btn = document.getElementById("registerBtn");
  if (selected.length === 0) {
    btn.disabled = true;
    btn.textContent = "בחר שעות להרשמה";
  } else {
    btn.disabled = false;
    btn.textContent = `✅ הרשמה ל־${selected.length} סלוט${selected.length > 1 ? "ים" : ""}`;
  }
}

// ================= SESSION =================
async function checkSession() {
  const { data: { session } } = await client.auth.getSession();

  if (session) {
    currentUserId = session.user.id;
    document.getElementById("authBox").style.display = "none";
    document.getElementById("appBox").style.display = "block";
    document.getElementById("stickyFooter").style.display = "flex";
    fetchRegistrations();
  }
}

// ================= FETCH =================
async function fetchRegistrations() {
  const { data: { session } } = await client.auth.getSession();
  if (!session) return;

  const res = await fetch(`${SUPABASE_URL}/functions/v1/get-registrations`, {
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`,
    }
  });

  const data = await res.json();
  renderRegistrations(data);
}

// ================= SUMMARY TABLE =================
function renderSummaryTable(data, dates) {
  const times = ["07:30", "17:00"];
  const hebrewDays = ["א","ב","ג","ד","ה","ו","ש"];

  const grouped = {};
  data.forEach(r => {
    const key = r.date + "|" + r.time;
    if (!grouped[key]) grouped[key] = 0;
    grouped[key]++;
  });

  const summaryCard = document.getElementById("summaryCard");
  const summaryTable = document.getElementById("summaryTable");
  summaryCard.style.display = "block";

  // Sort dates chronologically
  const sortedDates = [...dates].sort();

  const hebrewDayNames = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
  const letters = ["א","ב","ג","ד","ה","ו","ש"];

  let html = '<table class="summary-table" dir="rtl"><thead>';

  // Row 1: day name (שני, שלישי...)
  html += '<tr><th class="time-col"></th>';
  sortedDates.forEach(d => {
    const dayIdx = new Date(d).getDay();
    html += `<th style="font-size:11px;color:#e2e8f0;font-weight:bold;padding-bottom:2px">${hebrewDayNames[dayIdx]}</th>`;
  });
  html += '</tr>';

  // Row 2: letter + date
  html += '<tr><th class="time-col">שעה</th>';
  sortedDates.forEach(d => {
    const dayIdx = new Date(d).getDay();
    html += `<th>${letters[dayIdx]}<br><span style="font-size:10px;color:#64748b">${d.slice(5)}</span></th>`;
  });
  html += '</tr></thead><tbody>';

  times.forEach(time => {
    html += `<tr><td class="time-label">${time}</td>`;
    sortedDates.forEach(date => {
      const count = grouped[date + "|" + time] || 0;
      if (count === 0) {
        html += `<td class="cell-empty">—</td>`;
      } else if (count >= 4) {
        html += `<td class="cell-game">${count}</td>`;
      } else {
        html += `<td class="cell-few">${count}</td>`;
      }
    });
    html += "</tr>";
  });

  html += "</tbody></table>";
  summaryTable.innerHTML = html;
}

// ================= RENDER =================
function renderRegistrations(data) {
  const container = document.getElementById("days");
  container.innerHTML = "";

  const times = ["07:30", "17:00"];

  const grouped = {};
  data.forEach(r => {
    if (!grouped[r.date]) grouped[r.date] = [];
    grouped[r.date].push(r);
  });

  // Build ordered date list for next 7 days
  const upcomingDates = [];
  for (let i = 1; i <= 7; i++) {
    let tmp = new Date();
    tmp.setDate(tmp.getDate() + i);
    upcomingDates.push(formatDateLocal(tmp));
  }
  renderSummaryTable(data, upcomingDates);

  for (let i = 1; i <= 7; i++) {
    let d = new Date();
    d.setDate(d.getDate() + i);

    let date = formatDateLocal(d);
    const hebrewDay = d.toLocaleDateString("he-IL", { weekday: "long" });
    const holiday = holidaysMap[date];

    // Day header (outside card)
    const dayTimes = ["07:30", "17:00"];
    const dayTotal = dayTimes.reduce((sum, t) => sum + (grouped[date] || []).filter(x => x.time === t).length, 0);
    const dayGameOn = dayTimes.some(t => (grouped[date] || []).filter(x => x.time === t).length >= 4);

    const header = document.createElement("div");
    header.className = "day-header" + (i === 1 ? " day-header-first" : "");
    header.innerHTML = `
      <div>
        <div class="day-header-title">${hebrewDay}</div>
        <div class="day-header-date">${date}${holiday ? ` · 📅 ${holiday}` : ""}</div>
      </div>
      ${dayGameOn ? `<span class="day-header-badge">🏓 יש משחק!</span>` : ""}
    `;
    container.appendChild(header);

    // Weather strip
    const wx = weatherMap[date];
    if (wx) {
      const strip = document.createElement("div");
      strip.className = "weather-strip";
      const avgTemp = Math.round(((wx.tempMorning || 0) + (wx.tempEvening || 0)) / 2);
      const maxWind = Math.max(wx.windMorning || 0, wx.windEvening || 0);
      const windClass = maxWind >= 30 ? "w-wind strong" : "w-wind";
      const windWarning = maxWind >= 30 ? " ⚠️" : "";
      const wMornStrong = (wx.windMorning || 0) >= 30;
      const wEveStrong  = (wx.windEvening || 0) >= 30;
      strip.innerHTML = `
        <div class="weather-pill">
          <span class="w-label">בוקר ☀️</span>
          <div class="w-row">
            <span class="w-temp">${wx.tempMorning ?? "—"}°C</span>
            <span class="w-wind-val ${wMornStrong ? "strong" : ""}">🌬️ ${wx.windMorning ?? "—"} קמ"ש${wMornStrong ? " ⚠️" : ""}</span>
          </div>
        </div>
        <div class="weather-pill">
          <span class="w-label">ערב 🌙</span>
          <div class="w-row">
            <span class="w-temp">${wx.tempEvening ?? "—"}°C</span>
            <span class="w-wind-val ${wEveStrong ? "strong" : ""}">🌬️ ${wx.windEvening ?? "—"} קמ"ש${wEveStrong ? " ⚠️" : ""}</span>
          </div>
        </div>
      `;
      container.appendChild(strip);
    }

    const card = document.createElement("div");
    card.className = "card";

    let html = ``;

    times.forEach(time => {
      const bookings = (grouped[date] || []).filter(x => x.time === time);
      const count = bookings.length;
      const gameOn = count >= 4;
      const key = `${date}|${time}`;
      const isSelected = selected.includes(key);

      // Count badge label
      const countLabel = count === 0 ? "0 רשומים" : count === 1 ? "1 רשום" : `${count} רשומים`;

      html += `
        <div class="slot ${isSelected ? "selected" : ""}" onclick="toggleSlot('${date}','${time}', this)">
          <div class="slot-header">
            <b>${time}</b>
            <div class="slot-meta">
              ${gameOn ? `<span class="game-on-badge">🏓 יש משחק!</span>` : ""}
              <span class="count-badge">👥 ${countLabel}</span>
            </div>
          </div>
          <div style="font-size:13px;margin-top:8px">
            ${
              bookings.length
                ? bookings.map(b => `
                    <div class="booking-row">
                      <span>👤 ${b.name}</span>
                      ${
                        b.user_id === currentUserId
                          ? `<button class="trash-btn"
                              onclick="event.stopPropagation(); deleteRegistration('${b.id}')">
                              🗑️
                             </button>`
                          : ""
                      }
                    </div>
                  `).join("")
                : "<span style='color:#94a3b8'>זמין</span>"
            }
          </div>
        </div>
      `;
    });

    card.innerHTML = html;
    container.appendChild(card);
  }
}

// ================= SLOT =================
function toggleSlot(date, time, el) {
  const key = `${date}|${time}`;

  if (selected.includes(key)) {
    selected = selected.filter(x => x !== key);
    el.classList.remove("selected");
  } else {
    selected.push(key);
    el.classList.add("selected");
  }

  updateRegisterBtn();
}

// ================= DELETE =================
async function deleteRegistration(id) {
  const { data: { session } } = await client.auth.getSession();

  await fetch(`${SUPABASE_URL}/functions/v1/delete-registration`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`,
    },
    body: JSON.stringify({ id })
  });

  fetchRegistrations();
}

// ================= LOGIN =================
async function login() {
  const email = document.getElementById("email").value;

  const { error } = await client.auth.signInWithOtp({
    email,
    options: {
      emailRedirectTo: window.location.href
    }
  });

  if (error) alert(error.message);
  else alert("נשלח מייל 📧");
}

// ================= SUBMIT =================
async function submitForm() {
  const { data: { session } } = await client.auth.getSession();
  if (!session) return alert("צריך להתחבר");
  if (!selected.length) return alert("יש לבחור לפחות שעה אחת");

  const btn = document.getElementById("registerBtn");
  btn.disabled = true;
  btn.textContent = "שולח...";

  const res = await fetch(`${SUPABASE_URL}/functions/v1/create-registration`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`,
    },
    body: JSON.stringify({ slots: selected })
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.error);
    updateRegisterBtn();
    return;
  }

  selected = [];
  updateRegisterBtn();
  fetchRegistrations();
}

// ================= INIT =================
window.addEventListener("load", async () => {
  await Promise.all([loadHolidays(2026), loadWeather()]);
  checkSession();
});

client.auth.onAuthStateChange(() => {
  checkSession();
});
</script>

</body>
</html>
