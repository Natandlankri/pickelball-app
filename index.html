<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פיקלבול בת חפר 🎾</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

.container { max-width: 500px; margin: auto; padding: 20px; }
h1 { text-align: center; }

input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

.day {
  background: #1e293b;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.primary { background: #38bdf8; }
.login { background: #6366f1; color: white; }
</style>
</head>

<body dir="rtl">

<div class="container">

<h1>🎾 פיקלבול בת חפר</h1>

<!-- AUTH -->
<input id="email" placeholder="אימייל להתחברות">
<button class="login" onclick="login()">🔐 התחבר</button>

<hr>

<div id="userBox"></div>

<!-- APP (HIDDEN IF NOT LOGGED IN) -->
<div id="appBox" style="display:none">

<input id="name" placeholder="שם מלא">

<div id="days"></div>

<button class="primary" onclick="submitForm()">הרשמה</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://svasvbooeixwbfgyteml.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2YXN2Ym9vZWl4d2JmZ3l0ZW1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODE3MDAsImV4cCI6MjA5MTQ1NzcwMH0.SseXrAMUs8hgIxT0jOccH8svqaPR7lgOAWNcYvDvdo0";

const CREATE_URL = `${SUPABASE_URL}/functions/v1/create-registration`;

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const TIMES = ["08:00", "10:00", "18:00"];

let selected = [];

// =========================
// LOGIN
// =========================
async function login() {
  const email = document.getElementById("email").value.trim();

  if (!email) return alert("הכנס אימייל");

  const { error } = await client.auth.signInWithOtp({
    email,
    options: {
      emailRedirectTo: "https://natandlankri.github.io/pickelball-app/"
    }
  });

  if (error) {
    console.error(error);
    return alert("שגיאה");
  }

  alert("נשלח מייל 📧");
}

// =========================
// AUTH UI CONTROL
// =========================
async function updateAuthUI() {
  const { data: { user } } = await client.auth.getUser();

  const appBox = document.getElementById("appBox");
  const emailInput = document.getElementById("email");
  const loginBtn = document.querySelector(".login");

  if (user) {
    appBox.style.display = "block";

    emailInput.style.display = "none";
    loginBtn.style.display = "none";

    document.getElementById("userBox").innerHTML = `
      <p>מחובר כ: <b>${user.email}</b></p>
    `;
  } else {
    appBox.style.display = "none";

    emailInput.style.display = "block";
    loginBtn.style.display = "block";

    document.getElementById("userBox").innerHTML = "";
  }
}

// =========================
// DAYS + DROPDOWN
// =========================
function buildDays() {
  const container = document.getElementById("days");

  for (let i = 1; i <= 7; i++) {
    let d = new Date();
    d.setDate(d.getDate() + i);

    let date = new Date(d.getTime() - d.getTimezoneOffset() * 60000)
      .toISOString().split("T")[0];

    const div = document.createElement("div");
    div.className = "day";

    const options = TIMES.map(t =>
      `<option value="${date}|${t}">${t}</option>`
    ).join("");

    div.innerHTML = `
      <b>${date}</b>
      <select onchange="selectSlot(this)">
        <option value="">בחר שעה</option>
        ${options}
      </select>
    `;

    container.appendChild(div);
  }
}

// =========================
// SELECT SLOT
// =========================
function selectSlot(el) {
  if (!el.value) return;

  if (!selected.includes(el.value)) {
    selected.push(el.value);
  }

  console.log("selected:", selected);
}

// =========================
// SUBMIT
// =========================
async function submitForm() {
  const name = document.getElementById("name").value.trim();
  const { data: { session } } = await client.auth.getSession();

  if (!session) return alert("יש להתחבר");
  if (!name || selected.length === 0) return alert("בחר שעה");

  const res = await fetch(CREATE_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${session.access_token}`
    },
    body: JSON.stringify({
      name,
      slots: selected
    })
  });

  const data = await res.json().catch(() => ({}));

  if (!res.ok) {
    console.error(data);
    return alert("שגיאה בהרשמה");
  }

  selected = [];
  document.querySelectorAll("select").forEach(s => s.value = "");

  alert("נרשמת בהצלחה 🎾");
}

// =========================
// INIT
// =========================
buildDays();
updateAuthUI();
client.auth.onAuthStateChange(() => updateAuthUI());
</script>

</body>
</html>
